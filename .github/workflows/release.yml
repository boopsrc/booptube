name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  gate:
    if: contains(github.event.head_commit.message, 'Bump version')
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Read VERSION
        id: version
        run: echo "version=$(tr -d '\r\n' < VERSION)" >> "$GITHUB_OUTPUT"

  build-windows:
    needs: gate
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - uses: msys2/setup-msys2@v2
        with:
          update: true
          install: mingw-w64-x86_64-gcc

      - name: Add MinGW to PATH
        run: echo "C:\msys64\mingw64\bin" >> "$env:GITHUB_PATH"

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Fetch embedded dependencies
        shell: pwsh
        run: |
          pwsh -NoProfile -File scripts/fetch-ytdlp.ps1
          pwsh -NoProfile -File scripts/fetch-ffmpeg.ps1

      - name: Build portable
        shell: pwsh
        env:
          CGO_ENABLED: "1"
        run: |
          pwsh -NoProfile -File scripts/build.ps1
          pwsh -NoProfile -File scripts/package-portable.ps1

      - name: Build installer
        shell: pwsh
        env:
          CGO_ENABLED: "1"
        run: |
          pwsh -NoProfile -File scripts/build-bundled.ps1
          pwsh -NoProfile -File scripts/stage.ps1 -Mode bundled
          pwsh -NoProfile -File scripts/package.ps1

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-windows
          path: |
            .build/booptube-*-windows-amd64-portable.zip
            .build/booptube-*-windows-amd64-setup.exe
          include-hidden-files: true
          if-no-files-found: error

  build-linux:
    needs: gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libgl1-mesa-dev xorg-dev

      - name: Install nfpm
        run: |
          go install github.com/goreleaser/nfpm/v2/cmd/nfpm@latest
          echo "$HOME/go/bin" >> "$GITHUB_PATH"

      - name: Build portable and installer
        env:
          CGO_ENABLED: "1"
        run: |
          chmod +x scripts/*.sh installer/macos/*.sh installer/linux/*.sh
          make package-portable-linux
          make stage
          make package-linux

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-linux
          path: |
            .build/booptube-*-linux-amd64-portable.tar.gz
            .build/*.deb
            .build/*.rpm
          include-hidden-files: true
          if-no-files-found: error

  build-macos:
    needs: gate
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Build portable and installer
        env:
          CGO_ENABLED: "1"
        run: |
          chmod +x scripts/*.sh installer/macos/*.sh installer/linux/*.sh
          make package-portable-macos
          make stage
          make package-macos

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-macos
          path: |
            .build/booptube-*-macos-arm64-portable.tar.gz
            .build/booptube-*-macos-arm64-setup.dmg
          include-hidden-files: true
          if-no-files-found: error

  release:
    needs: [gate, build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true
          path: release-assets

      - name: List release files
        run: find release-assets -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.gate.outputs.version }}
          name: booptube ${{ needs.gate.outputs.version }}
          generate_release_notes: true
          body: |
            ## Downloads

            | Platform | Portable | Installer |
            |----------|----------|-----------|
            | Windows | `*-windows-amd64-portable.zip` | `*-windows-amd64-setup.exe` |
            | Linux | `*-linux-amd64-portable.tar.gz` | `*.deb`, `*.rpm` |
            | macOS | `*-macos-arm64-portable.tar.gz` | `*-macos-arm64-setup.dmg` |

            Guia de instalação: [doc/installer.md](https://github.com/${{ github.repository }}/blob/main/doc/installer.md)
          files: release-assets/**/*
          fail_on_unmatched_files: true
