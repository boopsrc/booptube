<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>booptube — Web</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="glow glow-cyan"></div>
  <div class="glow glow-magenta"></div>

  <main class="container">
    <header class="header">
      <h1 class="title">booptube</h1>
      <p class="subtitle">Baixe vídeos do YouTube em MP4 ou MP3 — processado no servidor</p>
    </header>

    <section class="card" id="form-section">
      <label class="label" for="url">URL do YouTube</label>
      <input type="url" id="url" class="input" placeholder="https://www.youtube.com/watch?v=..." autocomplete="off">

      <fieldset class="format-group">
        <legend class="label">Formato</legend>
        <label class="radio">
          <input type="radio" name="format" value="mp4" checked>
          <span>MP4 (vídeo)</span>
        </label>
        <label class="radio">
          <input type="radio" name="format" value="mp3">
          <span>MP3 (áudio)</span>
        </label>
      </fieldset>

      <button type="button" id="btn-download" class="btn btn-primary">Baixar</button>
    </section>

    <section class="card error hidden" id="error-section">
      <p class="error-msg" id="error-msg"></p>
      <button type="button" id="btn-retry" class="btn btn-secondary">Tentar novamente</button>
    </section>
  </main>

  <footer class="footer">
    <p>Após iniciar o download você será redirecionado para uma página com link compartilhável.</p>
  </footer>

  <script src="/static/app.js"></script>
</body>
</html>
